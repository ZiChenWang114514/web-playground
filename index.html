<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web-playground · 王子宸的可视化实验场</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #0f1b2d;
      color: #e6edf3;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 80px 20px 40px;
      background: radial-gradient(ellipse at top, #1d3557 0%, #0f1b2d 70%);
    }
    header h1 {
      font-size: 42px;
      margin: 0;
      background: linear-gradient(90deg, #a8c0d8, #e6edf3, #a8c0d8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    header p {
      color: #8b949e;
      font-size: 16px;
      margin-top: 10px;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px 60px;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 22px;
      margin-top: 30px;
    }
    .project-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .project-card:hover {
      transform: translateY(-4px);
      border-color: #58a6ff;
    }
    .project-card .emoji { font-size: 32px; margin-bottom: 12px; }
    .project-card h2 {
      font-size: 20px;
      margin: 0 0 8px;
      color: #58a6ff;
    }
    .project-card p {
      margin: 0;
      color: #8b949e;
      font-size: 14px;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      background: #1f6feb26;
      color: #79c0ff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 12px;
    }
    footer {
      text-align: center;
      color: #656d76;
      font-size: 12px;
      padding: 24px;
      border-top: 1px solid #21262d;
    }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>web-playground</h1>
  <p>王子宸的可视化实验场 · A collection of interactive data-viz experiments</p>
</header>

<div class="container">
  <h2 style="color:#e6edf3;font-size:18px;margin:0">🧪 当前实验</h2>

  <div class="projects">
    <a class="project-card" href="career-landscape/">
      <div class="emoji">📊</div>
      <h2>Career Landscape</h2>
      <p>跨越生化、CS、金融与交叉学科的多维就业景气图谱。可交互筛选 + 悬停画像 + 联动数据表。</p>
      <span class="tag">Plotly.js · 气泡图 · 15 domains</span>
    </a>
  </div>
</div>

<footer>
  © 2026 王子宸 · Hosted on
  <a href="https://github.com/ZiChenWang114514/web-playground">GitHub</a> ·
  Built for GitHub Pages
</footer>

</body>
</html>
